version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: trackr_user
      POSTGRES_PASSWORD: trackr_password
      POSTGRES_DB: trackr_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackr_user -d trackr_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://trackr_user:trackr_password@db/trackr_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - EXECUTION_BACKEND=celery
      - PYTHONPATH=/app
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: backend.Dockerfile
    command: ["celery", "-A", "core.execution.worker", "worker", "--loglevel=info", "--pool=threads", "--concurrency=2"]
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://trackr_user:trackr_password@db/trackr_db
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - EXECUTION_BACKEND=celery
      - PYTHONPATH=/app
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://backend:8000/api/v1
      - SYS_API_BASE_URL=http://backend:8000/api/v1/system
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
