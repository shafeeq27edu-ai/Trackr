version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: trackr-backend
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
      - trackr_db:/app/trackr.db
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: trackr-frontend
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://backend:8000/api/v1
      - SYS_API_BASE_URL=http://backend:8000/api/v1/system
    restart: unless-stopped

volumes:
  trackr_db:
