name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov ruff mypy

    - name: Lint with Ruff
      run: |
        ruff check .

    - name: Type check with mypy
      run: |
        mypy . || true # Optional enforcement for now

    - name: Test with pytest
      run: |
        pytest --cov=core --cov=api tests/ --cov-report=xml

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Backend Image
      run: docker build -t trackr-backend:test -f backend.Dockerfile .
      
    - name: Build Frontend Image
      run: docker build -t trackr-frontend:test -f frontend.Dockerfile .
